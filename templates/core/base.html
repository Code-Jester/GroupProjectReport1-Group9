<!DOCTYPE html>
<html>
<head>
    <title>Youth Justice System</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f5f5f5;
        }

        nav {
            background: #2c5d87;
            padding: 15px;
        }

        nav a {
            color: white;
            margin-right: 20px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .welcome {
            background: #e9f1f7;
            padding: 10px 30px;
        }

        .container {
            padding: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th {
            background: #2c5d87;
            color: white;
            padding: 12px;
            text-align: left;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background: #f1f1f1;
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            background: #2c5d87;
            color: white;
            padding: 10px 15px;
            border-radius: 6px;
            text-decoration: none;
        }

        .btn:hover {
            background: #1e4668;
        }

    </style>
</head>

<body>

<nav>
    <a href="/">Home</a>
    <a href="/youths/">Youths</a>
    <a href="/programs/">Programs</a>
    <a href="/participations/">Participations</a>
    <a href="/admin/">Admin</a>
</nav>

<div class="welcome">
    Welcome to Youth Justice System Dashboard
</div>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
