{% extends 'workforce/base.html' %}

{% block content %}
    <h2>Employers</h2>
    <ul class="card-list">
        {% for employer in employers %}
            <li>
                <strong>{{ employer.organisation_name }}</strong><br>
                Industry: {{ employer.industry }}<br>
                Location: {{ employer.location }}
            </li>
        {% empty %}
            <li>No employers found.</li>
        {% endfor %}
    </ul>
{% endblock %}
